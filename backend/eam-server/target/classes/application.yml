server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: eam-server
  
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/eam_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  
  # Jackson JSON 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# MyBatis-Plus 配置
mybatis-plus:
  # Mapper XML 文件位置
  mapper-locations: classpath*:/mapper/**/*.xml
  # 实体类扫描路径
  type-aliases-package: com.eam.entity
  # 配置
  configuration:
    # 开启驼峰命名转换：user_name -> userName
    map-underscore-to-camel-case: true
    # 打印 SQL 日志（开发环境开启，生产环境关闭）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  # 全局配置
  global-config:
    db-config:
      # 主键策略：自增
      id-type: auto
      # 逻辑删除字段
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  # 签名密钥（生产环境请修改为复杂的随机字符串，至少256位）
  secret: eam-system-jwt-secret-key-must-be-at-least-256-bits-long-for-security
  # Token 有效期（毫秒）：24小时 = 24 * 60 * 60 * 1000
  expiration: 86400000
  # 请求头名称
  header: Authorization
  # Token 前缀
  prefix: "Bearer "

# 日志配置
logging:
  level:
    com.eam: debug
    org.springframework.security: info

# SpringDoc 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
